checks.","Ajoin sekä Node.js:n että npm:n versiokomennot."),pt("node-versions-seen","I saw both version numbers.","Näin molemmat versionumerot.")]})],successLooksLike:[ut("Node.js is installed and npm is available.","Node.js on asennettu ja npm on käytettävissä."),ut("You can verify both from the VS Code terminal.","Osaat tarkistaa molemmat VS Coden terminaalista.")],tip:ut("If Copilot later suggests another runtime or language, ask it to simplify back to the approved stack.","Jos Copilot ehdottaa myöhemmin muuta runtimea tai kieltä, pyydä sitä yksinkertaistamaan takaisin hyväksyttyyn pinoon.")},{id:6,title:ut("Install GitHub Copilot in VS Code","Asenna GitHub Copilot VS Codeen"),goal:ut("Get Copilot ready inside VS Code so it can guide the whole build for you.","Laita Copilot valmiiksi VS Coden sisälle, jotta se voi ohjata koko rakentamista puolestasi."),sections:[ht("copilot-page",ct.openOfficialPage,[ut("If you want an official page to follow, open the GitHub Copilot page for VS Code.","Jos haluat virallisen sivun tueksi, avaa GitHub Copilotin sivu VS Codelle."),ut("You can also stay inside VS Code, open the Extensions view, and search for GitHub Copilot there.","Voit myös pysyä VS Coden sisällä, avata Extensions-näkymän ja hakea sieltä GitHub Copilotia.")],{resources:[mt("copilot-marketplace","https://marketplace.visualstudio.com/items?itemName=GitHub.copilot","GitHub Copilot in VS Code Marketplace","GitHub Copilot VS Code Marketplacessa","Official GitHub Copilot extension page for VS Code.","Virallinen GitHub Copilot -laajennuksen sivu VS Codelle.")]}),ht("copilot-install",ct.doThisInVsCode,[ut("Install the GitHub Copilot extension published by GitHub.","Asenna GitHubin julkaisema GitHub Copilot -laajennus."),ut("If VS Code asks you to sign in, complete that sign-in with the same GitHub account you prepared earlier.","Jos VS Code pyytää kirjautumaan sisään, viimeistele kirjautuminen samalla GitHub-tilillä, jonka valmistelit aiemmin."),ut("Open Copilot Chat inside VS Code so you know exactly where to ask for help during the workshop.","Avaa Copilot Chat VS Coden sisällä, jotta tiedät tarkalleen missä pyydät apua workshopin aikana."),ut("You do not need to hand-write the project code. Your job is to tell Copilot clearly what to do.","Sinun ei tarvitse kirjoittaa projektikoodia käsin. Tehtäväsi on kertoa Copilotille selkeästi mitä sen pitää tehdä.")],{checks:[pt("copilot-installed","The GitHub Copilot extension is installed.","GitHub Copilot -laajennus on asennettu."),pt("copilot-signed-in","I am signed in to GitHub Copilot in VS Code.","Olen kirjautunut GitHub Copilotiin VS Codessa."),pt("copilot-chat-open","I can open Copilot Chat in VS Code.","Pystyn avaamaan Copilot Chatin VS Codessa.")]})],successLooksLike:[ut("Copilot is installed and signed in inside VS Code.","Copilot on asennettu ja sisäänkirjautuneena VS Coden sisällä."),ut("You know where to talk to Copilot during the workshop.","Tiedät missä keskustelet Copilotin kanssa workshopin aikana.")],tip:ut("If you see more than one Copilot-related extension, choose the main GitHub Copilot extension published by GitHub.","Jos näet useita Copilot-laajennuksia, valitse GitHubin julkaisema päälaajennus GitHub Copilot.")},{id:7,title:ut("Install GitHub CLI and sign in","Asenna GitHub CLI ja kirjaudu sisään"),goal:ut("Set up GitHub CLI now so pushing your work later stays simple.","Laita GitHub CLI valmiiksi nyt, jotta työsi puskeminen myöhemmin pysyy helppona."),sections:[ht("gh-install",ct.openOfficialPage,[ut("Open the official GitHub CLI page and install it for your computer.","Avaa GitHub CLI:n virallinen sivu ja asenna se tietokoneellesi."),ut("Finish the install first, then return to VS Code.","Vie asennus ensin loppuun ja palaa sitten VS Codeen.")],{resources:[mt("github-cli-install","https://cli.github.com/","GitHub CLI install page","GitHub CLI:n asennussivu","Official GitHub CLI page with install instructions for Windows, macOS, and Linux.","Virallinen GitHub CLI -sivu, jossa on asennusohjeet Windowsille, macOS:lle ja Linuxille.")]}),ht("gh-check",ct.typeInTerminal,[ut("Click inside the VS Code terminal.","Klikkaa VS Coden terminaalin sisään."),ut("Type gh --version and press Enter. This checks that GitHub CLI is installed.","Kirjoita gh --version ja paina Enter. Näin tarkistat, että GitHub CLI on asennettu."),ut("Then type gh auth status and press Enter. This tells you whether GitHub CLI is already signed in.","Kirjoita sen jälkeen gh auth status ja paina Enter. Se kertoo, onko GitHub CLI jo kirjautunut sisään."),ut("If the tool says you are not signed in yet, follow the sign-in steps it gives you. If a browser opens, finish the sign-in there, then return to VS Code and run gh auth status again.","Jos työkalu kertoo, ettet ole vielä kirjautunut sisään, seuraa sen antamia kirjautumisvaiheita. Jos selain avautuu, viimeistele kirjautuminen siellä ja palaa sitten VS Codeen ajamaan gh auth status uudelleen.")],{commands:["gh --version","gh auth status"],osNote:{windows:ut("VS Coden terminaali voi olla oletuksena PowerShell. Se sopii tähän tarkistukseen hyvin.","VS Coden terminaali voi olla oletuksena PowerShell. Se sopii tähän tarkistukseen hyvin."),"mac-linux":ut("Pysy samassa VS Coden terminaalissa, jonka avasit aiemmin. Näin kaikki komentovaiheet tapahtuvat samassa paikassa.","Pysy samassa VS Coden terminaalissa, jonka avasit aiemmin. Näin kaikki komentovaiheet tapahtuvat samassa paikassa.")},checks:[pt("gh-installed","GitHub CLI is installed.","GitHub CLI on asennettu."),pt("gh-sign-in-complete","I completed the GitHub CLI sign-in flow.","Viimeistelin GitHub CLI:n kirjautumisen."),pt("gh-authenticated","GitHub CLI shows that I am authenticated.","GitHub CLI näyttää minut todennetuksi.")]})],successLooksLike:[ut("GitHub CLI is installed.","GitHub CLI on asennettu."),ut("The CLI shows you as signed in and ready to use later.","CLI näyttää sinut sisäänkirjautuneena ja valmiina myöhempää käyttöä varten.")],tip:ut("This step saves time later when you create a private repository and push your project to GitHub.","Tämä vaihe säästää aikaa myöhemmin, kun luot yksityisen repositorion ja pusket projektisi GitHubiin.")},{id:8,title:ut("Create and open a new project folder","Luo ja avaa uusi projektikansio"),goal:ut("Give Copilot a clean place where it can build your app without confusion.","Anna Copilotille puhdas paikka, jossa se voi rakentaa sovelluksesi ilman sekaannusta."),sections:[ht("project-folder",ct.doThisInVsCode,[ut("Create a new folder for this project in a place you can easily find again later, such as Desktop or Documents.","Luo tälle projektille uusi kansio paikkaan, jonka löydät myöhemmin helposti uudelleen, esimerkiksi Työpöydälle tai Dokumentteihin."),ut("Open that folder in VS Code.","Avaa kyseinen kansio VS Codessa."),ut("Before you continue, check that the folder is empty or otherwise clean. Copilot works better when it starts from a clear place.","Ennen kuin jatkat, tarkista että kansio on tyhjä tai muuten siisti. Copilot toimii paremmin, kun se aloittaa selkeästä paikasta.")],{checks:[pt("folder-created","I created an empty project folder.","Loin tyhjän projektikansion."),pt("folder-opened","I opened that folder in VS Code.","Avasin kyseisen kansion VS Codessa."),pt("folder-clean","The folder is empty or clean.","Kansio on tyhjä tai siisti.")]})],successLooksLike:[ut("The project folder exists and is open in VS Code.","Projektikansio on olemassa ja avoinna VS Codessa."),ut("You are starting from a clean place.","Aloitat puhtaasta paikasta.")],tip:ut("A clean folder makes it easier for Copilot to build the first version without getting distracted by unrelated files.","Puhdas kansio helpottaa Copilotia rakentamaan ensimmäisen version ilman, että se häiriintyy muista tiedostoista.")},{id:9,title:ut("Ask Copilot for the first full version","Pyydä Copilotia tekemään ensimmäinen kokonainen versio"),goal:ut("Describe your idea clearly and let Copilot build the first version inside the approved stack.","Kuvaile ideasi selkeästi ja anna Copilotin rakentaa ensimmäinen versio hyväksytyn pinon sisällä."),sections:[ht("first-build",ct.askCopilot,[ut("Open Copilot Chat in VS Code.","Avaa Copilot Chat VS Codessa."),ut("Describe your idea in plain language: who the app is for, what problem it helps with, the main screen or main flow, and what the first version must already be able to do.","Kuvaile ideasi tavallisella kielellä: kenelle sovellus on, mitä ongelmaa se auttaa ratkaisemaan, mikä on pääruutu tai pääkulku ja mitä ensimmäisen version pitää jo pystyä tekemään."),ut("Turn planning mode on before you run your build prompt. The planning step helps Copilot explain the structure before it starts changing files.","Laita planning mode päälle ennen kuin ajat varsinaisen rakentamispromptin. Suunnitteluvaihe auttaa Copilotia selittämään rakenteen ennen kuin se alkaa muuttaa tiedostoja."),ut("Tell Copilot clearly that the app must be built with Node, TypeScript, Vite, and React. Keep it simple, local, and inside the approved stack.","Kerro Copilotille selkeästi, että sovellus pitää rakentaa Nodea, TypeScriptiä, Viteä ja Reactia käyttäen. Pidä projekti yksinkertaisena, paikallisena ja hyväksytyn pinon sisällä."),ut("Use the example prompt below if you want a safe starting point. You do not need to hand-write the project code yourself.","Käytä alla olevaa esimerkkipromptia, jos haluat turvallisen lähtökohdan. Sinun ei tarvitse kirjoittaa projektikoodia itse käsin.")],{snippets:[dt("copilot-first-build-prompt","prompt","Example Copilot prompt","Esimerkkiprompti Copilotille","Build my first full version as a simple local app using Node, TypeScript, Vite, and React. Keep everything inside the approved workshop stack. Please start by making a short plan, then build the first working version for me.\n\nMy app idea: [replace this with your idea]\nWho it is for: [replace this]\nMain problem it solves: [replace this]\nMain screens or main flow: [replace this]\nWhat the first version must already do: [replace this]","Rakenna minulle ensimmäinen kokonainen versio yksinkertaisena paikallisena sovelluksena käyttäen Nodea, TypeScriptiä, Viteä ja Reactia. Pidä kaikki hyväksytyn workshop-pinon sisällä. Aloita lyhyellä suunnitelmalla ja rakenna sen jälkeen ensimmäinen toimiva versio.\n\nSovellusideani: [korvaa omalla ideallasi]\nKenelle sovellus on: [korvaa tämä]\nMitä ongelmaa se ratkaisee: [korvaa tämä]\nPääruudut tai pääkulku: [korvaa tämä]\nMitä ensimmäisen version pitää jo tehdä: [korvaa tämä]")],checks:[pt("idea-described","I described my app idea in detail.","Kuvailin sovellusideani riittävän tarkasti."),pt("plan-mode-used","I asked Copilot to start with a plan.","Pyysin Copilotia aloittamaan suunnitelmalla."),pt("first-version-generated","Copilot generated the first version.","Copilot loi ensimmäisen version.")]})],successLooksLike:[ut("Copilot has a clear first version to build from your description.","Copilotilla on selkeä ensimmäinen versio rakennettavaksi kuvauksesi pohjalta."),ut("The project still stays simple and inside the workshop stack.","Projekti pysyy edelleen yksinkertaisena ja workshop-pinon sisällä.")],tip:ut("If your idea truly needs a small local Node.js + TypeScript service and local SQLite, keep it small and local. Do not let the build drift into extra infrastructure.","Jos ideasi oikeasti tarvitsee pienen paikallisen Node.js + TypeScript -palvelun ja paikallisen SQLiten, pidä se pienenä ja paikallisena. Älä anna rakennuksen ajautua lisäinfrastruktuuriin.")},{id:10,title:ut("Run your app","Käynnistä sovellus"),goal:ut("Get the first version running on your own computer so you can look at it in the browser.","Saa ensimmäinen versio käyntiin omalla tietokoneellasi, jotta voit katsoa sitä selaimessa."),sections:[ht("run-ask",ct.askCopilot,[ut("Ask Copilot for the exact commands you need to install dependencies and start the app.","Kysy Copilotilta tarkat komennot, joilla asennat riippuvuudet ja käynnistät sovelluksen."),ut("If the answer feels long or dense, ask Copilot to give you one command at a time.","Jos vastaus tuntuu pitkältä tai tiiviiltä, pyydä Copilotia antamaan yksi komento kerrallaan.")]),ht("run-do",ct.doThisNow,[ut("Run the commands Copilot gives you in the VS Code terminal, one at a time.","Aja Copilotin antamat komennot VS Coden terminaalissa yksi kerrallaan."),ut("Wait for each command to finish before you type the next one.","Odota, että jokainen komento valmistuu, ennen kuin kirjoitat seuraavan."),ut("When the app starts, Copilot will usually show a local address such as localhost. Open that address in your browser.","Kun sovellus käynnistyy, Copilot näyttää yleensä paikallisen osoitteen, kuten localhost. Avaa tuo osoite selaimessa.")],{checks:[pt("app-started","I started the app locally.","Käynnistin sovelluksen paikallisesti."),pt("app-opened","I opened the app in the browser.","Avasin sovelluksen selaimessa.")]})],successLooksLike:[ut("The app is running on your computer.","Sovellus käy omalla tietokoneellasi."),ut("You can see the first version in the browser.","Näet ensimmäisen version selaimessa.")],tip:ut("If Copilot suggests hosted services, external databases, or complex setup, stop and ask it to simplify back to the workshop stack.","Jos Copilot ehdottaa hostattuja palveluita, ulkoisia tietokantoja tai monimutkaista käyttöönottoa, pysäytä se ja pyydä yksinkertaistamaan takaisin workshop-pinoon.")},{id:11,title:ut("Review the app and ask for the first changes","Katso sovellusta ja pyydä ensimmäiset muutokset"),goal:ut("Look at the running app, spot something real to improve, and ask Copilot to fix it.","Katso käynnissä olevaa sovellusta, löydä yksi oikea parannuskohde ja pyydä Copilotia korjaamaan se."),sections:[ht("review-browser",ct.lookInBrowser,[ut("Click through the running app in the browser slowly.","Klikkaa käynnissä olevaa sovellusta selaimessa rauhassa läpi."),ut("Find at least one thing that feels missing, confusing, broken, or unfinished.","Löydä ainakin yksi asia, joka tuntuu puuttuvalta, sekavalta, rikkoutuneelta tai keskeneräiseltä."),ut("Choose one concrete improvement instead of a huge rewrite.","Valitse yksi konkreettinen parannus suuren uudelleenrakennuksen sijaan.")],{checks:[pt("improvement-found","I found at least one thing to improve.","Löysin ainakin yhden parannettavan asian.")]}),ht("review-copilot",ct.askCopilot,[ut("Tell Copilot exactly what you want changed and why.","Kerro Copilotille täsmälleen mitä haluat muuttaa ja miksi."),ut("After Copilot updates the project, refresh the browser and check the new result.","Kun Copilot on päivittänyt projektin, päivitä selain ja tarkista uusi tulos.")],{checks:[pt("change-requested","I asked Copilot to make the change.","Pyysin Copilotia tekemään muutoksen."),pt("updated-result-seen","I saw the updated result in the browser.","Näin päivitetyn tuloksen selaimessa.")]})],successLooksLike:[ut("You identified a real improvement instead of guessing.","Tunnistit oikean parannuskohteen etkä arvaillut."),ut("You saw Copilot make the change in the running app.","Näit Copilotin tekemän muutoksen käynnissä olevassa sovelluksessa.")],tip:ut("Short and specific follow-up prompts usually work better than asking for a complete rebuild.","Lyhyet ja tarkat jatkopromptit toimivat yleensä paremmin kuin kokonaisen uudelleenrakennuksen pyytäminen.")},{id:12,title:ut("Add one new feature","Lisää yksi uusi ominaisuus"),goal:ut("Practice asking Copilot for one useful new feature without restarting the project.","Harjoittele pyytämään Copilotilta yhtä hyödyllistä uutta ominaisuutta aloittamatta projektia alusta."),sections:[ht("feature-copilot",ct.askCopilot,[ut("Choose one small new feature that would genuinely make the app better.","Valitse yksi pieni uusi ominaisuus, joka oikeasti parantaisi sovellusta."),ut("Ask Copilot to add only that feature and keep the rest of the project steady.","Pyydä Copilotia lisäämään vain tuo ominaisuus ja pitämään muu projekti vakaana."),ut("Run or refresh the app again and test the new feature.","Käynnistä tai päivitä sovellus uudelleen ja testaa uusi ominaisuus.")],{checks:[pt("feature-requested","I asked Copilot for one new useful feature.","Pyysin Copilotia lisäämään yhden uuden hyödyllisen ominaisuuden."),pt("app-still-runs","The app still runs after the change.","Sovellus toimii edelleen muutoksen jälkeen."),pt("feature-works","The new feature works.","Uusi ominaisuus toimii.")]})],successLooksLike:[ut("You asked for one clear new feature.","Pyysit yhden selkeän uuden ominaisuuden."),ut("The app still runs and the feature works.","Sovellus toimii edelleen ja ominaisuus toimii.")],tip:ut("Keep the first new feature modest. The goal is a clear win, not maximum scope.","Pidä ensimmäinen uusi ominaisuus maltillisena. Tavoite on selkeä onnistuminen, ei maksimaalinen laajuus.")},{id:13,title:ut("Save your work with Git","Tallenna työsi Gitillä"),goal:ut("Save the project properly with Git so your work has a name, an email, a first commit, and a clean history state.","Tallenna projekti kunnolla Gitillä, jotta työlläsi on nimi, sähköposti, ensimmäinen commit ja siisti historiatila."),sections:[ht("git-email-settings",ct.openOfficialPage,[ut("Git usually asks for a name and an email before it lets you make commits.","Git pyytää yleensä nimeä ja sähköpostiosoitetta ennen kuin se antaa tehdä committeja."),ut("If you do not want to expose your personal or work email in commit history, GitHub offers a private noreply email that is a good default for this workshop.","Jos et halua näyttää henkilökohtaista tai työosoitettasi commit-historiassa, GitHub tarjoaa yksityisen noreply-sähköpostin, joka on tähän workshopiin hyvä oletusvalinta."),ut("Open GitHub Settings -> Emails to find that private email before you ask Copilot to configure Git for this repository.","Avaa GitHub Settings -> Emails löytääksesi tuon yksityisen sähköpostin ennen kuin pyydät Copilotia määrittämään Gitin tälle repositoriolle.")],{resources:[mt("github-email-settings","https://github.com/settings/emails","GitHub email settings","GitHubin sähköpostiasetukset","Find your GitHub private noreply email here if you want to use it for Git commits.","Löydät GitHubin yksityisen noreply-sähköpostin täältä, jos haluat käyttää sitä Git-commiteissa.")]}),ht("git-save-copilot",ct.askCopilot,[ut("Use Copilot to guide this step slowly. Ask it to give you one command at a time and a short explanation before you run each command.","Käytä Copilotia tämän vaiheen rauhalliseen ohjaukseen. Pyydä sitä antamaan yksi komento kerrallaan ja lyhyt selitys ennen kuin ajat komennon."),ut("Tell Copilot that you want to set Git name and email for this repository, initialize Git if needed, make the first commit, and finish by checking that the repository is clean.","Kerro Copilotille, että haluat asettaa Gitin nimen ja sähköpostin tälle repositoriolle, alustaa Gitin tarvittaessa, tehdä ensimmäisen commitin ja lopuksi tarkistaa että repositorio on puhdas."),ut("If you want to use the GitHub private email, tell Copilot that you found it in GitHub Settings -> Emails and want to use that address for git user.email.","Jos haluat käyttää GitHubin yksityistä sähköpostia, kerro Copilotille että löysit sen GitHub Settings -> Emails -sivulta ja haluat käyttää sitä git user.email -asetuksessa.")],{snippets:[dt("git-save-prompt","prompt","Example Copilot prompt","Esimerkkiprompti Copilotille","Please guide me through saving this project with Git one command at a time. Before each command, explain briefly what it does.\n\nI need help to:\n- set git user.name and git user.email for this repository\n- tell me how to use my GitHub private noreply email from Settings -> Emails if I want to use that\n- initialize Git if this folder is not a Git repository yet\n- add the project files\n- make the first commit\n- run git status at the end and confirm that the repository is clean","Ohjaa minua tallentamaan tämä projekti Gitillä yksi komento kerrallaan. Selitä ennen jokaista komentoa lyhyesti mitä se tekee.\n\nTarvitsen apua näihin:\n- aseta git user.name ja git user.email tälle repositoriolle\n- kerro miten voin käyttää GitHubin yksityistä noreply-sähköpostia Settings -> Emails -sivulta, jos haluan käyttää sitä\n- alusta Git, jos tämä kansio ei ole vielä Git-repositorio\n- lisää projektin tiedostot\n- tee ensimmäinen commit\n- aja lopuksi git status ja vahvista että repositorio on puhdas")]}),ht("git-save-do",ct.doThisNow,[ut("Stay in the VS Code terminal and follow Copilot one command at a time.","Pysy VS Coden terminaalissa ja seuraa Copilotia yksi komento kerrallaan."),ut("If Git asks for your name and email, use the values you chose for this repository before you continue to the first commit.","Jos Git kysyy nimeä ja sähköpostia, käytä tälle repositoriolle valitsemiasi arvoja ennen kuin jatkat ensimmäiseen commitiin."),ut("After the first commit, run the final status check Copilot gives you and make sure it says the repository is clean before you mark this step complete.","Ensimmäisen commitin jälkeen aja Copilotin antama lopullinen tilatarkistus ja varmista, että se kertoo repositorion olevan puhdas ennen kuin merkitset tämän vaiheen valmiiksi.")],{checks:[pt("git-identity-set","Git name and email are set for this repository.","Gitin nimi ja sähköposti on asetettu tälle repositoriolle."),pt("git-init-ready","Git is initialized if needed.","Git on alustettu tarvittaessa."),pt("first-commit-made","I made the first commit.","Tein ensimmäisen commitin."),pt("repo-clean","The repository is clean after the commit.","Repositorio on commitin jälkeen puhdas.")]})],successLooksLike:[ut("Your Git name and email are configured for this repository.","Gitin nimi ja sähköposti on määritetty tälle repositoriolle."),ut("Your work is saved in Git history and the repository is clean after the first commit.","Työsi on tallennettu Git-historiaan ja repositorio on puhdas ensimmäisen commitin jälkeen.")],tip:ut("If Co
